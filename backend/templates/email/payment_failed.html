<!doctype html>
<html>
  <body style="font-family: -apple-system, sans-serif; max-width: 560px; margin: 0 auto; padding: 24px;">
    <h1 style="font-size: 22px;">We couldn't charge your card</h1>
    <p>Hi {{ name }} — Stripe declined the latest charge for <strong>{{ tenant_name }}</strong>.</p>
    <p>Please update your payment method to avoid losing access. Your monitoring still works for now, but we'll suspend the account if the next retry also fails.</p>
    <p><a href="{{ billing_url }}"
          style="display:inline-block; background:#dc2626; color:white; padding:12px 20px; border-radius:6px; text-decoration:none;">
       Update payment method
    </a></p>
  </body>
</html>
