name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: oltmanager_test
          POSTGRES_USER: oltmanager
          POSTGRES_PASSWORD: ci-only-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U oltmanager -d oltmanager_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+psycopg2://oltmanager:ci-only-password@localhost:5432/oltmanager_test
      JWT_SECRET_KEY: ci-jwt-secret
      MASTER_ENCRYPTION_KEY: ci-master-key
      ENVIRONMENT: test
      EMAIL_PROVIDER: console
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      WG_INTERFACE: wg0
      WG_HUB_ENDPOINT: hub.example.com:51820
      WG_HUB_PUBKEY: ci-placeholder
      WG_SUPERNET: 10.99.0.0/22

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run alembic migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Run pytest
        working-directory: backend
        run: pytest tests/ -v --tb=short

  frontend:
    name: Frontend (vite + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-v2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-v2/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Type check
        run: npx tsc -b

      - name: Run vitest
        run: npm test

      - name: Build
        run: npm run build

  docker-build:
    name: Docker image (smoke)
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build SaaS image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.saas
          push: false
          tags: oltmgr-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
