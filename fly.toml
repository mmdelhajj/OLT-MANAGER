# Fly.io deployment manifest for the OLT Manager SaaS backend (Phase 5).
# Deploy with:
#   flyctl deploy --config fly.toml --dockerfile backend/Dockerfile.saas
#
# Secrets — set via `flyctl secrets set ...`:
#   DATABASE_URL              postgresql://... (Neon / Supabase pooled URL)
#   JWT_SECRET_KEY            random 32+ bytes
#   MASTER_ENCRYPTION_KEY     32+ bytes, used to wrap per-tenant DEKs
#   STRIPE_SECRET_KEY         sk_live_...
#   STRIPE_WEBHOOK_SECRET     whsec_...
#   EMAIL_PROVIDER_API_KEY    Postmark / Resend API key
#   WG_HUB_PUBKEY             public key of the WG hub
#
# Non-secret config goes in [env] below.

app = "olt-manager"
primary_region = "fra"  # Frankfurt — closest to most EU ISPs

[build]
  dockerfile = "backend/Dockerfile.saas"

[env]
  PORT = "8000"
  ENVIRONMENT = "production"
  LOG_LEVEL = "INFO"
  EMAIL_PROVIDER = "postmark"
  WG_INTERFACE = "wg0"
  WG_HUB_ENDPOINT = "wg.oltmanager.io:51820"
  WG_SUPERNET = "10.0.0.0/8"
  WG_DNS = "1.1.1.1"
  WG_KEEPALIVE = "25"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 2  # always keep 2 alive so deploys are zero-downtime
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 1024
  size = "shared-cpu-2x"

[deploy]
  release_command = "alembic upgrade head"
  strategy = "rolling"

[[metrics]]
  port = 8000
  path = "/metrics"
